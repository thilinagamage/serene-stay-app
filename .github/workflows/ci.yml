name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci
      - run: npm run lint

      - run: npm run build
        env:
          DATABASE_URL: "postgresql://postgres:test@localhost:5432/test?sslmode=disable"
          SESSION_SECRET: "ci-test-secret-minimum-32-characters-long"
          AWS_REGION: "us-east-1"
          AWS_S3_BUCKET: "ci-test-bucket"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: lint-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/serene-stay-app
            git pull origin main
            npm ci --omit=dev
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            pm2 reload ecosystem.config.js --update-env
