name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci
      - run: npm run lint

      - run: npm run build
        env:
          DATABASE_URL: "postgresql://postgres:test@localhost:5432/test?sslmode=disable"
          SESSION_SECRET: "ci-test-secret-minimum-32-characters-long"
          AWS_REGION: "us-east-1"
          AWS_S3_BUCKET: "ci-test-bucket"
